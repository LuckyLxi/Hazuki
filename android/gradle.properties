# 不在仓库中硬编码 org.gradle.java.home，避免 CI / 非 Windows 环境因本地绝对路径失效。
# 如需本地固定 JDK，请在用户级 ~/.gradle/gradle.properties 或环境变量 JAVA_HOME 中配置。
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.ndk.suppressMinSdkVersionError=21

# Windows 下 Kotlin 增量编译在跨盘符（项目盘符与 Pub/Gradle 缓存盘符不同）时可能触发缓存相对路径异常
kotlin.incremental=false
kotlin.incremental.android=false
