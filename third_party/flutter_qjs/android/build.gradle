group 'soko.ekibun.flutter_qjs'
version '1.0-SNAPSHOT'

def resolveFlutterSdkDir() {
    def candidates = [
        file('local.properties'),
        file('../../../android/local.properties'),
    ]
    for (def propertiesFile in candidates) {
        if (!propertiesFile.exists()) {
            continue
        }
        def properties = new Properties()
        propertiesFile.withInputStream { properties.load(it) }
        def flutterSdk = properties.getProperty('flutter.sdk')
        if (flutterSdk != null && !flutterSdk.isBlank()) {
            return flutterSdk.replace('\\:', ':').replace('\\\\', '\\')
        }
    }
    return System.getenv('FLUTTER_ROOT')
}

def flutterSdkDir = resolveFlutterSdkDir()
def flutterJar = flutterSdkDir != null
    ? file("${flutterSdkDir}/bin/cache/artifacts/engine/android-arm64/flutter.jar")
    : null

buildscript {
    ext.kotlin_version = '2.1.21'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'soko.ekibun.flutter_qjs'
    compileSdk 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdk 16
    }

    lint {
        disable += 'InvalidPackage'
        disable += ['AndroidGradlePluginVersion', 'GradleDependency']
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cxx/CMakeLists.txt')
        }
    }
}

dependencies {
    if (flutterJar != null && flutterJar.exists()) {
        compileOnly files(flutterJar)
    }
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
