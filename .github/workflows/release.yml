name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  android-release:
    name: Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Static analysis
        run: flutter analyze

      - name: Decode keystore
        run: echo "${{ secrets.HazukiNoa }}" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hazuki-android-split-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Resolve release notes from tag annotation
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          tag_message="$(git for-each-ref "refs/tags/${RELEASE_TAG}" --format='%(contents)')"
          {
            echo "body<<EOF"
            printf '%s\n' "${tag_message}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Release Android assets to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          generate_release_notes: false
          draft: false
          prerelease: false

  windows-release:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Build Windows app
        run: flutter build windows --release

      - name: Build Windows MSIX
        run: flutter pub run msix:create

      - name: Create Windows package
        shell: pwsh
        run: |
          $packageName = "hazuki-windows-x64-${{ github.ref_name }}.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $packageName -Force
          $msixName = "hazuki-windows-x64-${{ github.ref_name }}.msix"
          Move-Item -Path "build/windows/x64/runner/Release/hazuki.msix" -Destination $msixName
          "WINDOWS_PACKAGE=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_MSIX=$msixName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hazuki-windows-x64
          path: |
            ${{ env.WINDOWS_PACKAGE }}
            ${{ env.WINDOWS_MSIX }}
          if-no-files-found: error

      - name: Resolve release notes from tag annotation
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          tag_message="$(git for-each-ref "refs/tags/${RELEASE_TAG}" --format='%(contents)')"
          {
            echo "body<<EOF"
            printf '%s\n' "${tag_message}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Release Windows asset to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.WINDOWS_PACKAGE }}
            ${{ env.WINDOWS_MSIX }}
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          generate_release_notes: false
          draft: false
          prerelease: false

  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    needs:
      - android-release
      - windows-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate update.json
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          release_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}")"

          version="${RELEASE_TAG#v}"
          release_url="$(printf '%s' "${release_json}" | jq -r '.html_url')"
          changelog="$(printf '%s' "${release_json}" | jq -r '.body // ""')"
          arm64_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("arm64-v8a"; "i")) | .browser_download_url' | head -n 1)"
          armv7_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("armeabi-v7a"; "i")) | .browser_download_url' | head -n 1)"
          x64_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("x86_64"; "i")) | .browser_download_url' | head -n 1)"
          x86_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("(^|[^0-9])x86([^0-9]|$)"; "i")) | .browser_download_url' | head -n 1)"
          windows_x64_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("hazuki-windows-x64.*\\.zip$"; "i")) | .browser_download_url' | head -n 1)"
          windows_msix_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | test("hazuki-windows-x64.*\\.msix$"; "i")) | .browser_download_url' | head -n 1)"

          jq -n \
            --arg version "${version}" \
            --arg releaseUrl "${release_url}" \
            --arg arm64 "${arm64_url}" \
            --arg armv7 "${armv7_url}" \
            --arg x64 "${x64_url}" \
            --arg x86 "${x86_url}" \
            --arg windowsX64 "${windows_x64_url}" \
            --arg windowsMsix "${windows_msix_url}" \
            --arg changelog "${changelog}" \
            '{
              version: $version,
              releaseUrl: $releaseUrl,
              apkUrls: (
                {}
                + (if $arm64 != "" then {"arm64-v8a": $arm64} else {} end)
                + (if $armv7 != "" then {"armeabi-v7a": $armv7} else {} end)
                + (if $x64 != "" then {"x86_64": $x64} else {} end)
                + (if $x86 != "" then {"x86": $x86} else {} end)
              )
            }
            + (if ($windowsX64 != "" or $windowsMsix != "") then
                {windowsUrls: (
                  {}
                  + (if $windowsX64 != "" then {"x64_zip": $windowsX64} else {} end)
                  + (if $windowsMsix != "" then {"x64_msix": $windowsMsix} else {} end)
                )}
               else {} end)
            + (if $changelog != "" then {changelog: $changelog} else {} end)' > update.json

      - name: Commit update.json
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update update.json for ${GITHUB_REF_NAME} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"
