name: Release
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Static analysis
        run: flutter analyze

      # 把 jks 文件从 Base64 还原出来，存到 android/app/ 目录下
      - name: Decode keystore
        run: echo "${{ secrets.HazukiNoa }}" | base64 --decode > android/app/keystore.jks

      # 写入签名配置，注意不能有前导空格否则 Flutter/Gradle 会读取失败
      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      # 使用 split-per-abi 打包，生成 armeabi-v7a / arm64-v8a / x86_64 三个 APK
      - name: Build Android APKs (Split per ABI)
        run: flutter build apk --release --split-per-abi

      # 上传所有生成的 APK 为 artifact
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hazuki-android-split-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      # 只有打了 v* tag 才发布到 Releases
      - name: Release to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk
          name: Hazuki ${{ github.ref_name }}
          draft: false
          prerelease: false
