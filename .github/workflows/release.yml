name: Release
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Static analysis
        run: flutter analyze

      # 把 jks 文件从 Base64 还原出来
      - name: Decode keystore
        run: echo "${{ secrets.HazukiNoa }}" | base64 --decode > android/app/keystore.jks

      # 写入签名配置到 key.properties
      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # 使用 split-per-abi 打包，不指定 target-platform 默认会包含所有架构并拆分
      - name: Build Android APKs (Split per ABI)
        run: flutter build apk --release --split-per-abi

      # 使用通配符上传所有生成的 APK
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hazuki-android-split-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      # 只有打了 tag 才发布到 Releases
      - name: Release to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # 这里的通配符会将 v7a, v8a, x86_64 等所有 APK 一起发布
          files: build/app/outputs/flutter-apk/app-*-release.apk
          name: Hazuki ${{ github.ref_name }}
          draft: false
          prerelease: false
