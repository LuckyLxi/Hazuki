name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: APK build mode
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
  push:
    branches:
      - main
      - master
      - work
  pull_request:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUILD_MODE: ${{ inputs.build_mode || 'release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --${BUILD_MODE}

      - name: Resolve artifact metadata
        run: |
          echo "APK_PATH=build/app/outputs/flutter-apk/app-${BUILD_MODE}.apk" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=hazuki-apk-${BUILD_MODE}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14
